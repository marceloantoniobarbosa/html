<!DOCTYPE html>
<html lang="pt_BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>

<body>
    <form action="receber-dados.html" method="POST">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome">
        <br>
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email">
        <br>
        <button type="button">salvar</button>
        <button type="submit">deletar</button>
        <br>
        <input type="radio" name="sexo" value="masculino">Masculino
        <input type="radio" name="sexo" value="feminino">Feminino
        <input type="radio" name="sexo" value="outros">Outros
        <br>
        <input type="checkbox" name="hobbies[]">Ouvir música
        <input type="checkbox" name="hobbies[]">Tomar cerveja
        <input type="checkbox" name="hobbies[]">Dormir até tarde
        <br>
        <select id="estado">
            <option value="">Selecione</option>
            <option value="AC">Acre</option>
            <option value="SP">São Paulo</option>
            <option value="MG">Minas Gerais</option>
            <option value="RJ">Rio de Janeiro</option>
        </select>
        <br>
        <fieldset>
            <legend>Dados Pessoais</legend>
            <label for="nome">Nome</label>
            <input type="text" id="nome">

            <label for="email">E-mail</label>
            <input type="email" id="email">
        </fieldset>
        <br>
        <label for="idade">Idade:</label>
        <input type="number" id="idade" name="idade" min="1" max="120" step="1" value="18">
        <br>
        <label for="points">Pontuação:</label>
        <input type="range" id="points" name="points" min="0" max="10">
        <br>
        <input type="text" placeholder="Digite o seu nome">
        <input type="text" placeholder="Digite o seu email" required>
        <input type="text" placeholder="Digite o seu sobrenome" autofocus>
        <input type="text" placeholder="Não editável" disabled>
        <br>
        <label for="cor">Escolha uma cor:</label>
        <input type="color">
        <br>
        <label for="data">Data:</label>
        <input type="date" id="data" name="data"></label>
        <br>
        <label for="">Data e hora:</label>
        <input type="datetime-local">
        <br>
        <label for="">Enviar arquivo:</label>
        <input type="file" accept="image/*">
        <br>
        <label for="">Seu site:</label>
        <input type="url">
        <button type="submit">Enviar</button>
        <br>
        <label for="">Telefone:</label>
        <input type="tel" pattern="[0-9]+" inputmode="numeric">
        <br>
        <label for="">Buscar:</label>
        <input type="search">
        <br>
        <label for="">Escolha um navegador:</label>
        <input list="navegadores">
        <datalist id="navegadores">
            <option value="Chrome"></option>
            <option value="Firefox"></option>
            <option value="Edge"></option>
            <option value="Safari"></option>
        </datalist>
        <br>
        <label for="">Progtesso:</label>
        <progress value="70" max="100"></progress>


    </form>
</body>

</html>
