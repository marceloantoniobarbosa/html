<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Formulário</title>
</head>
<body>
    <h1>FORMULÁRIO</h1> 
    <br>  
    <fieldset>
    <legend>Dados Pessoais</legend>      
    <form action="salvar-dados.html" method="POST">
        <label for="nome">Nome Completo:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite o seu nome" required>
        <br>
        <input type="radio" name="sexo" value="masculino">Masculino
        <input type="radio" name="sexo" value="feminino">Feminino
        <input type="radio" name="sexo" value="outros">Outros
        <br>        
        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" name="cpf" placeholder="Digite o seu cpf" required>
        <br>
        <label for="rg">RG:</label>
        <input type="text" id="rg" name="rg" placeholder="Digite o seu rg">
        <br>
        <label for="datanascimento">Data de Nascimento:</label>
        <input type="date" id="datanascimento" name="datanascimento"></label>                
    </form>
    </fieldset>
    <br>
    <fieldset>
    <legend>Contato</legend>
    <form action="receber-dados.html" method="POST">
        <label for="telefone">Número de telefone:</label>
        <input type="text" id="telefone" placeholder="DDD 0000-0000" required>
        <br>
        <label for="celular">Número do Celular:</label>
        <input type="text" id="celular" placeholder="DDD 00000-000">
        <br>
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="abcdef@abcd.com.br" required>
    </form>
    </fieldset>
    <br>
    <fieldset>
    <br>
    <legend>Segurança</legend>
    <form action="receber-dados.html" method="POST">
        <label for="senha">Senha</label>
        <input type="text" id="senha" placeholder="******">
        <label for="confirmsenha">Confirme a Senha:</label>
        <input type="text" id="confirmsenha" placeholder="******">
    </form>
    </fieldset>
    <br>
    <fieldset>
        <legend>Endereço:</legend>
        <label for="cep">CEP:</label>
        <input type="text" id="cep" placeholder="00000-000" required>

        <label for="endereco">Endereço:</label>
        <input type="text" id="endereco" placeholder="Rua abcdefgh" required>

        <label for="numero">Número:</label>
        <input type="text" id="numero" placeholder="000000" max="8" required>     
        
        <label for="bairro">Bairro:</label>
        <input type="text" id="bairro" placeholder="Bairro Abcdefg" required>
        
        <label for="complemento">Complemeto:</label>
        <input type="text" id="complemento">
        
        <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" placeholder="Cidade" required>

        <select id="estado">
            <option value="">Selecione</option>
            <option value="AC">Acre</option>
            <option value="SP">São Paulo</option>
            <option value="MG">Minas Gerais</option>
            <option value="RJ">Rio de Janeiro</option>
        </select>
    </fieldset>
        <br>
        <button type="button">Salvar</button>
        <button type="submit">Enviar</button>
</body>
</html>
